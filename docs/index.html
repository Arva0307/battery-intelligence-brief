<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📁 Brief Archive — Battery Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0d1b2a;
    --accent:  #00c2cb;
    --bg:      #f0f2f5;
    --white:   #fff;
    --border:  #e2e8f0;
    --muted:   #94a3b8;
    --text:    #1e293b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--navy);
    border-bottom: 3px solid var(--accent);
    padding: 36px 40px 32px;
  }

  .hero-emoji { font-size: 28px; margin-bottom: 10px; display: block; }

  .hero h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .hero-sub {
    font-size: 14px;
    color: var(--muted);
  }

  /* ── STATS ── */
  .stats-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    gap: 48px;
  }

  .stat-block { display: flex; flex-direction: column; gap: 3px; }

  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── FILTER + SEARCH ── */
  .filter-search-row {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 6px;
  }

  .filter-btn {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: #cbd5e1; background: #f8fafc; }
  .filter-btn.active { background: var(--navy); border-color: var(--navy); color: #fff; }

  .search-box {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    background: #f8fafc;
    color: var(--text);
    border-radius: 8px;
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); background: var(--white); }
  .search-box::placeholder { color: var(--muted); }

  /* ── GRID ── */
  .grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 40px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  /* ── CARD ── */
  .edition-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .edition-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 6px 0 0 6px;
  }

  .edition-card:hover {
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .card-edition {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }

  /* Thought Seed — teal left border, no background */
  .card-seed {
    border-left: 3px solid var(--accent);
    padding: 4px 10px;
    margin-bottom: 14px;
  }

  .card-seed p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }

  /* Tags */
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    color: #fff !important;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tag-storage    { background: #00c2cb; }
  .tag-grid       { background: #0d1b2a; }
  .tag-market     { background: #d4880a; }
  .tag-policy     { background: #b35c00; }
  .tag-tech       { background: #c47d0e; }
  .tag-safety     { background: #e74c3c; }
  .tag-datacenter { background: #27ae60; }
  .tag-macro      { background: #6366f1; }

  /* Signal line */
  .card-signal {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 0;
    font-size: 14px;
    color: var(--muted);
  }

  @media (max-width: 960px) { .grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .hero, .stats-bar, .filter-search-row, .grid-wrap { padding-left: 20px; padding-right: 20px; }
    .hero h1 { font-size: 22px; }
    .filter-search-row { flex-direction: column; align-items: flex-start; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<section class="hero">
  <span class="hero-emoji">📁</span>
  <h1>Brief Archive — Battery Intelligence</h1>
  <p class="hero-sub">All editions · Searchable by date, tag, and Thought Seed topic</p>
</section>

<div class="stats-bar">
  <div class="stat-block">
    <div class="stat-num" id="stat-editions">0</div>
    <div class="stat-label">Editions</div>
  </div>
  <div class="stat-block">
    <div class="stat-num" id="stat-week">0</div>
    <div class="stat-label">This Week</div>
  </div>
  <div class="stat-block">
    <div class="stat-num" id="stat-seeds">0</div>
    <div class="stat-label">Thought Seeds</div>
  </div>
</div>

<div class="filter-search-row">
  <div class="filter-group">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="storage">Storage</button>
    <button class="filter-btn" data-filter="grid">Grid</button>
    <button class="filter-btn" data-filter="market">Market</button>
    <button class="filter-btn" data-filter="policy">Policy</button>
    <button class="filter-btn" data-filter="tech">Tech</button>
    <button class="filter-btn" data-filter="datacenter">Datacenter</button>
    <button class="filter-btn" data-filter="macro">Macro</button>
    <button class="filter-btn" data-filter="safety">Safety</button>
  </div>
  <input class="search-box" type="text" id="searchInput" placeholder="Search editions...">
</div>

<div class="grid-wrap">
  <div class="grid" id="editionGrid">
    <div class="empty-msg">No editions yet — generate your first brief to get started.</div>
  </div>
</div>

<script>
const EDITIONS = EDITIONS_DATA_PLACEHOLDER;

function pad(n) { return String(n).padStart(3, '0'); }

function renderCards(data) {
  const grid = document.getElementById('editionGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty-msg">No editions match your search.</div>';
    return;
  }
  grid.innerHTML = data.map(ed => {
    const tags = ed.tags.map(t =>
      `<span class="tag tag-${t.toLowerCase()}">${t}</span>`).join('');
    const seed = ed.seed
      ? `<div class="card-seed"><p>🌱 ${ed.seed}</p></div>` : '';
    const signal = ed.signal
      ? `<div class="card-signal">📊 ${ed.signal}</div>` : '';
    return `<a class="edition-card" href="${ed.file}"
      data-tags="${ed.tags.join(',').toLowerCase()}"
      data-search="${(ed.title+' '+ed.seed+' '+ed.tags.join(' ')).toLowerCase()}">
      <div class="card-edition">Edition #${pad(ed.edition)}</div>
      <div class="card-meta">${ed.date} · ~18 MIN</div>
      <div class="card-title">${ed.title}</div>
      ${seed}
      <div class="card-tags">${tags}</div>
      ${signal}
    </a>`;
  }).join('');
}

function updateStats() {
  document.getElementById('stat-editions').textContent = EDITIONS.length;
  const week = Date.now() - 7*24*60*60*1000;
  document.getElementById('stat-week').textContent =
    EDITIONS.filter(e => new Date(e.isoDate) >= week).length;
  document.getElementById('stat-seeds').textContent =
    EDITIONS.filter(e => e.seed).length;
}

let activeFilter = 'all', searchQuery = '';

function applyFilters() {
  let data = [...EDITIONS];
  if (activeFilter !== 'all')
    data = data.filter(e => e.tags.map(t=>t.toLowerCase()).includes(activeFilter));
  if (searchQuery)
    data = data.filter(e =>
      (e.title+' '+e.seed+' '+e.tags.join(' ')).toLowerCase().includes(searchQuery));
  renderCards(data);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  applyFilters();
});

updateStats();
if (EDITIONS.length) renderCards(EDITIONS);
</script>
</body>
</html>
