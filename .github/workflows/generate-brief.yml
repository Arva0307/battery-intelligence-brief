name: Generate Battery Intelligence Brief

on:
  schedule:
    - cron: '0 13 * * *'   # 7:00 AM CST = 13:00 UTC
  workflow_dispatch:         # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_brief.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          EDITION=$(python3 -c "import json; print(json.load(open('state/edition.json'))['edition'] - 1)")
          git diff --cached --quiet || git commit -m "Brief Edition ${EDITION} — $(date -u +'%Y-%m-%d')"
          git push
